<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻阅读偏好统计</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* iframe嵌入时的适配样式 */
    body.in-iframe {
      background: transparent;
      overflow-x: hidden;
    }

    body.in-iframe .container {
      padding: 10px 20px;
      max-width: 100%;
    }

    body.in-iframe header {
      margin-bottom: 16px;
    }

    /* 隐藏标题，保留日期选择和返回按钮 */
    body.in-iframe .header-title {
      display: none;
    }

    body.in-iframe footer {
      display: none;
    }

    body.in-iframe .bg-white.rounded-2xl {
      box-shadow: none;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
    }

    /* 自定义下拉框箭头 */
    .select-wrapper::after {
      content: '\f107';
      font-family: 'FontAwesome';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #64748b;
    }
  </style>
</head>
<body class="text-slate-600 antialiased min-h-screen flex flex-col">

<div class="container mx-auto px-4 py-10 max-w-6xl flex-grow">

  <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <div class="header-title flex items-center gap-3 self-start md:self-center">
      <div class="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
        <i class="fa fa-pie-chart fa-lg"></i>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">偏好数据分析</h1>
        <p class="text-sm text-slate-500">用户阅读行为可视化报表</p>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">

      <a href="/" class="back-btn w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-2.5 bg-white border border-slate-200 text-slate-600 hover:text-indigo-600 hover:border-indigo-300 rounded-xl shadow-sm transition-all font-medium text-sm group">
        <i class="fa fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
        <span>返回统计页</span>
      </a>

      <div class="w-full sm:w-auto bg-white p-1.5 rounded-xl shadow-sm border border-slate-200">
        <form action="/stat" method="get" class="flex items-center gap-2">
          <div class="relative select-wrapper flex-grow sm:flex-grow-0">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <i class="fa fa-calendar"></i>
            </div>
            <select id="date" name="date" required
                    class="w-full sm:w-auto appearance-none pl-9 pr-10 py-2 bg-slate-50 border border-transparent hover:bg-slate-100 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-lg text-sm font-medium text-slate-700 transition-all outline-none cursor-pointer">
              <option th:each="d : ${dates}" th:value="${d}" th:text="${d}" th:selected="${d eq date}"></option>
            </select>
          </div>
          <button type="submit" class="flex items-center gap-2 px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg shadow-md shadow-indigo-200 transition-all active:scale-95 whitespace-nowrap">
            <span>加载</span>
            <i class="fa fa-refresh"></i>
          </button>
        </form>
      </div>
    </div>
  </header>

  <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden">

    <div class="px-6 py-4 border-b border-slate-50 flex justify-between items-center">
      <h3 class="font-semibold text-slate-700 flex items-center gap-2">
        <i class="fa fa-bar-chart text-indigo-500"></i>
        统计详情
      </h3>
      <span class="text-xs font-mono bg-slate-100 text-slate-500 px-2 py-1 rounded" th:text="'Date: ' + ${date}"></span>
    </div>

    <div class="p-6 relative min-h-[600px]">
      <div id="noDataState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 z-10 bg-white/80 backdrop-blur-sm">
        <i class="fa fa-folder-open-o fa-3x mb-4 opacity-50"></i>
        <p class="font-medium">当前日期暂无数据</p>
      </div>

      <div id="chart" class="w-full h-[600px]"></div>
    </div>
  </div>

  <footer class="mt-10 text-center text-slate-400 text-xs">
    User Behavior Analytics System &copy; 2025
  </footer>
</div>

<script th:inline="javascript">
  // 检测是否在iframe中
  if (window.self !== window.top) {
    document.body.classList.add('in-iframe');
  }

  // 从后台获取数据
  const stats = /*[[${stats}]]*/ [];
  const date = /*[[${date}]]*/ '';

  // 初始化图表容器
  const chartDom = document.getElementById('chart');
  const noDataState = document.getElementById('noDataState');

  // 检查是否有数据
  if (stats && stats.length > 0) {
    // 初始化 ECharts
    const myChart = echarts.init(chartDom);

    // 数据处理
    let actionCountMap = {};
    stats.forEach(stat => {
      let key = stat.articleId + '_' + stat.action;
      actionCountMap[key] = (actionCountMap[key] || 0) + stat.count;
    });

    let articleIds = [...new Set(stats.map(stat => stat.articleId))];
    let actions = [...new Set(stats.map(stat => stat.action))];

    // 配色方案
    const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b'];

    // 构造 Series
    let series = articleIds.map((articleId, index) => {
      return {
        name: articleId,
        type: 'bar',
        barMaxWidth: 40,
        itemStyle: {
          borderRadius: [4, 4, 0, 0],
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: colors[index % colors.length] },
            { offset: 1, color: hexToRgba(colors[index % colors.length], 0.7) }
          ])
        },
        emphasis: { focus: 'series' },
        data: actions.map(action => actionCountMap[articleId + '_' + action] || 0)
      };
    });

    // 配置 Option
    let option = {
      backgroundColor: '#fff',
      title: {
        text: '文章交互行为分布',
        subtext: '基于 ' + date + ' 的用户点击数据',
        left: 'center',
        top: 0,
        textStyle: { color: '#1e293b', fontSize: 18, fontWeight: '600' },
        subtextStyle: { color: '#64748b' }
      },
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        backgroundColor: 'rgba(255, 255, 255, 0.9)',
        borderColor: '#e2e8f0',
        borderWidth: 1,
        textStyle: { color: '#334155' },
        extraCssText: 'box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);'
      },
      legend: {
        bottom: 0,
        padding: [20, 0, 0, 0],
        data: articleIds,
        itemGap: 20,
        textStyle: { color: '#64748b' }
      },
      grid: {
        left: '3%',
        right: '4%',
        bottom: '10%',
        top: '15%',
        containLabel: true,
        show: false
      },
      xAxis: {
        type: 'category',
        data: actions,
        axisLine: { lineStyle: { color: '#cbd5e1' } },
        axisTick: { show: false },
        axisLabel: {
          color: '#475569',
          fontWeight: '500',
          fontSize: 13,
          interval: 0
        }
      },
      yAxis: {
        type: 'value',
        name: '交互次数',
        nameTextStyle: { color: '#94a3b8', padding: [0, 0, 0, 20] },
        splitLine: {
          lineStyle: {
            type: 'dashed',
            color: '#f1f5f9'
          }
        },
        axisLine: { show: false },
        axisLabel: { color: '#64748b' }
      },
      series: series,
      animationDuration: 1000,
      animationEasing: 'cubicOut'
    };

    myChart.setOption(option);
    window.addEventListener('resize', function() { myChart.resize(); });

  } else {
    chartDom.style.display = 'none';
    noDataState.classList.remove('hidden');
  }

  function hexToRgba(hex, opacity) {
    let c;
    if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
      c= hex.substring(1).split('');
      if(c.length== 3){
        c= [c[0], c[0], c[1], c[1], c[2], c[2]];
      }
      c= '0x'+c.join('');
      return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+opacity+')';
    }
    return hex;
  }
</script>
</body>
</html>
