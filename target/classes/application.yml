spring:
  # 数据库配置（JdbcTemplate依赖此配置）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ghl?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 替换为你的MySQL用户名
    password: 123456  # 替换为你的MySQL密码
    hikari:
      maximum-pool-size: 10  # 连接池大小，根据需求调整
      connection-timeout: 30000  # 连接超时时间（毫秒）
  thymeleaf:
    cache: false